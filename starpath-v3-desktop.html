<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>星途 · StarPath v3 Desktop — 爱豆应援模拟器</title>
<style>
/* ================================================================
   星途 · StarPath v3 — 完全重写版
   移动端优先 · 不限制内存 · 无限制上传 · 离线版
   ================================================================ */
:root {
  --bg: #06080f;
  --bg2: #0c1018;
  --surface: rgba(14,20,36,.75);
  --surface2: rgba(20,28,48,.6);
  --card: rgba(16,24,44,.8);
  --fg: #e8ecf4;
  --muted: rgba(200,210,230,.55);
  --border: rgba(100,180,255,.12);
  --glow-border: rgba(0,240,255,.25);
  --cyan: #00f0ff;
  --magenta: #ff2d95;
  --gold: #ffd700;
  --violet: #a855f7;
  --green: #00e68a;
  --red: #ff4d6a;
  --glow-c: rgba(0,240,255,.4);
  --glow-m: rgba(255,45,149,.4);
  --glow-g: rgba(255,215,0,.4);
  --r: 14px;
  --r-sm: 10px;
  --r-full: 999px;
  --safe-b: env(safe-area-inset-bottom,0px);
  --safe-t: env(safe-area-inset-top,0px);
  --nav-h: 60px;
  --font: 'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
  --mono: 'JetBrains Mono','Fira Code',ui-monospace,Menlo,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100%;min-height:100dvh;
  background:var(--bg);color:var(--fg);
  font:14px/1.55 var(--font);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  user-select:none;overflow-x:hidden;
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,240,255,.15);border-radius:99px}

/* 粒子画布 */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

/* 星云 */
.neb{position:fixed;border-radius:50%;filter:blur(40px);pointer-events:none;z-index:0;opacity:.25;animation:nebP 8s ease-in-out infinite alternate}
.neb.n1{width:400px;height:400px;top:-100px;left:-80px;background:var(--cyan)}
.neb.n2{width:350px;height:350px;bottom:-60px;right:-40px;background:var(--magenta);animation-delay:-3s}
.neb.n3{width:250px;height:250px;top:35%;left:55%;background:var(--violet);animation-delay:-5s;opacity:.12}
@keyframes nebP{0%{transform:scale(1);opacity:.15}100%{transform:scale(1.15);opacity:.3}}

button{appearance:none;border:0;cursor:pointer;font-family:inherit;transition:all .2s}
button:active{transform:scale(.95)}

/* 顶部栏 */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:10px;
  padding:calc(8px + var(--safe-t)) 14px 8px;
  background:rgba(6,8,15,.9);
  backdrop-filter:blur(8px) saturate(1.2);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;gap:10px;align-items:center;flex:1;min-width:0}
.brand .logo{
  width:36px;height:36px;border-radius:11px;
  overflow:hidden;border:1.5px solid var(--glow-border);
  background:var(--surface);flex-shrink:0;
  box-shadow:0 0 12px var(--glow-c);
}
.brand .logo img{width:100%;height:100%;object-fit:cover;display:block}
.brand .titles{min-width:0}
.brand .titles h1{
  font-size:15px;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,var(--cyan),var(--magenta));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.brand .titles .sub{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:.08em}
.top-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.top-right .ic{
  width:36px;height:36px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--fg);display:grid;place-items:center;font-size:15px;
  position:relative;
}
.top-right .ic .dot{
  position:absolute;top:-2px;right:-2px;width:14px;height:14px;
  border-radius:50%;background:var(--magenta);
  font-size:8px;font-weight:700;color:#fff;
  display:grid;place-items:center;
  box-shadow:0 0 6px var(--glow-m);
}

/* 等级条 */
.lv-bar{
  padding:0 14px 6px;
  background:rgba(6,8,15,.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.lv-lbl{font-size:10px;font-family:var(--mono);color:var(--gold);letter-spacing:.06em;white-space:nowrap;text-shadow:0 0 6px var(--glow-g)}
.lv-track{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.lv-track span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--cyan));transition:width .5s;box-shadow:0 0 6px var(--glow-g)}
.lv-xp{font-size:10px;font-family:var(--mono);color:var(--muted);white-space:nowrap}

/* 内容区 */
.content{
  padding:12px 14px;
  padding-bottom:calc(var(--nav-h) + 16px + var(--safe-b));
  display:flex;flex-direction:column;gap:12px;
  min-height:calc(100vh - 100px);min-height:calc(100dvh - 100px);
}

/* 面板 */
.panel{display:none;animation:pIn .25s ease}
.panel.active{display:block}
@keyframes pIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 底部导航 */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:rgba(6,8,15,.95);
  backdrop-filter:blur(14px) saturate(1.2);
  border-top:1px solid var(--border);
  display:flex;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:transparent;color:var(--muted);font-size:10px;font-weight:600;
  letter-spacing:.02em;transition:color .2s;
  position:relative;
}
.nav-item .nav-icon{font-size:22px;line-height:1;transition:transform .2s}
.nav-item.active{color:var(--cyan)}
.nav-item.active .nav-icon{transform:scale(1.15)}
.nav-item.active::after{
  content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--magenta));
  border-radius:0 0 2px 2px;
  box-shadow:0 0 8px var(--glow-c);
}

/* 卡片 */
.card{
  background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);overflow:hidden;
  backdrop-filter:blur(8px);
}
.card-body{padding:14px}
.card-title{font-size:16px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:7px}

/* 个人资料 */
.profile-section{
  background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);padding:14px;
  backdrop-filter:blur(10px);
}
.avatar-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.av{
  width:62px;height:62px;border-radius:14px;overflow:hidden;
  border:2px solid var(--glow-border);background:var(--surface);
  flex-shrink:0;box-shadow:0 0 16px rgba(0,240,255,.12);
  position:relative;
}
.av::after{
  content:'';position:absolute;inset:-2px;border-radius:16px;
  background:conic-gradient(var(--cyan),var(--magenta),var(--gold),var(--cyan));
  z-index:-1;opacity:.4;animation:avG 4s linear infinite;
}
@keyframes avG{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
.av img{width:100%;height:100%;object-fit:cover;display:block}
.av-info{flex:1;min-width:120px}
.name-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.name-row input{
  flex:1;min-width:70px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--surface2);
  color:var(--fg);padding:7px 10px;font-size:14px;font-weight:700;
  outline:none;height:36px;transition:border-color .2s;
}
.name-row input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,240,255,.1)}
.act-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}

/* 小按钮 */
.btn-s{
  padding:5px 12px;font-size:11px;border-radius:var(--r-full);
  min-height:30px;line-height:1.2;font-weight:600;
  background:var(--surface2);border:1px solid var(--border);color:var(--fg);
}
.btn-s:hover{border-color:var(--glow-border)}
.btn-s.pri{
  background:linear-gradient(135deg,var(--cyan),var(--magenta));
  border-color:transparent;color:#fff;
  box-shadow:0 3px 12px rgba(0,240,255,.25);
}
.btn-file{position:relative;overflow:hidden}
.btn-file input[type=file]{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:80px}

/* 属性卡片 */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
.st{
  background:var(--surface2);padding:10px 6px;border-radius:var(--r-sm);
  text-align:center;border:1px solid var(--border);
  transition:border-color .3s;
}
.st:hover{border-color:var(--glow-border)}
.st .lb{color:var(--muted);font-size:10px;letter-spacing:.04em;display:block}
.st .vl{
  display:block;margin-top:3px;font-size:20px;font-weight:800;
  font-family:var(--mono);font-variant-numeric:tabular-nums;
}
.st .vl.c{color:var(--cyan);text-shadow:0 0 10px var(--glow-c)}
.st .vl.m{color:var(--magenta);text-shadow:0 0 10px var(--glow-m)}
.st .vl.g{color:var(--gold);text-shadow:0 0 10px var(--glow-g)}

/* 能力条 */
.meters{background:var(--surface2);padding:12px;border-radius:var(--r-sm);border:1px solid var(--border);margin:6px 0}
.mt-i+.mt-i{margin-top:10px}
.mt-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.mt-r .lb{font-size:12px;color:var(--muted)}
.mt-r .bv{
  font-size:10px;font-family:var(--mono);font-weight:700;
  padding:2px 8px;border-radius:var(--r-full);letter-spacing:.06em;
}
.mt-r .bv.cy{background:rgba(0,240,255,.1);color:var(--cyan)}
.mt-r .bv.mg{background:rgba(255,45,149,.1);color:var(--magenta)}
.mt-r .bv.gd{background:rgba(255,215,0,.1);color:var(--gold)}
.mt-bar{height:4px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.mt-bar span{display:block;height:100%;border-radius:99px;transition:width .5s}
.mt-bar .bc{background:linear-gradient(90deg,var(--cyan),#00a8ff);box-shadow:0 0 6px var(--glow-c)}
.mt-bar .bm{background:linear-gradient(90deg,var(--magenta),#ff6b9d);box-shadow:0 0 6px var(--glow-m)}
.mt-bar .bg{background:linear-gradient(90deg,var(--gold),#ffaa00);box-shadow:0 0 6px var(--glow-g)}

/* 连击区 */
.combo-z{text-align:center;margin:8px 0;padding:12px;background:var(--surface2);border-radius:var(--r-sm);border:1px solid var(--border)}
.combo-z .c-lb{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.combo-z .c-num{
  font-size:32px;font-weight:900;font-family:var(--mono);
  background:linear-gradient(135deg,var(--cyan),var(--magenta),var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  line-height:1;transition:transform .15s;
}
.combo-z .c-num.bump{transform:scale(1.2)}
.combo-z .c-mul{font-size:12px;color:var(--gold);font-family:var(--mono);margin-top:3px}

/* 心情能量 */
.mood-z{display:flex;gap:8px;margin:8px 0}
.mood-i{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px;text-align:center}
.mood-i .mi{font-size:18px;display:block;margin-bottom:2px}
.mood-i .ml{font-size:9px;color:var(--muted);letter-spacing:.06em}
.mood-i .mv{font-size:15px;font-weight:800;font-family:var(--mono);margin-top:1px}

/* 功能按钮 */
.act-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.act-btns .ab{
  appearance:none;border:1px solid var(--border);border-radius:var(--r-sm);
  padding:10px 8px;font-weight:700;font-size:12px;cursor:pointer;
  min-height:44px;line-height:1.3;text-align:center;
  background:var(--surface2);color:var(--fg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
}
.act-btns .ab:hover{border-color:var(--glow-border);box-shadow:0 0 12px rgba(0,240,255,.1)}
.act-btns .ab .ai{font-size:18px}
.act-btns .ab.fl{grid-column:1/-1}
.act-btns .ab.ch{
  background:linear-gradient(135deg,rgba(0,240,255,.12),rgba(255,45,149,.12));
  border-color:var(--glow-border);color:var(--cyan);
}
.act-btns .ab.ch:active{background:linear-gradient(135deg,rgba(0,240,255,.25),rgba(255,45,149,.25))}
.act-btns .ab.dng{color:var(--red);border-color:rgba(255,77,106,.2);background:rgba(255,77,106,.06)}

/* 视频播放器 */
.pw{position:relative}
.player{
  position:relative;background:#000;aspect-ratio:16/9;width:100%;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--r) var(--r) 0 0;overflow:hidden;
}
.player video{width:100%;height:100%;object-fit:contain;background:#000;display:block}
.player .no-v{color:var(--muted);font-size:14px;text-align:center;padding:20px;display:flex;flex-direction:column;gap:6px;align-items:center}
.player .no-v .bi{font-size:40px;opacity:.4}
.player .no-v .su{font-size:12px;opacity:.5}
.player .lk{
  position:absolute;right:10px;top:10px;
  background:rgba(0,0,0,.6);padding:5px 12px;border-radius:var(--r-full);
  font-size:12px;font-family:var(--mono);
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);
  pointer-events:none;z-index:5;color:var(--magenta);
}
.player .ov{
  position:absolute;left:10px;bottom:10px;
  display:flex;gap:5px;flex-wrap:wrap;z-index:5;
}
.player .ov .ch{
  padding:6px 12px;border-radius:var(--r-full);
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.1);
  cursor:pointer;color:#fff;font-size:11px;font-weight:600;
  backdrop-filter:blur(8px);display:flex;align-items:center;gap:3px;min-height:32px;
}
.player .ov .ch:hover{border-color:var(--cyan)}
.pctrl{
  display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;align-items:center;
  background:rgba(12,16,24,.6);backdrop-filter:blur(8px);
}
.pctrl .cc{
  padding:5px 10px;border-radius:var(--r-full);background:var(--surface2);
  border:1px solid var(--border);color:var(--fg);font-size:11px;
  cursor:pointer;display:flex;align-items:center;gap:3px;min-height:30px;white-space:nowrap;
}
.pctrl .cc:hover{border-color:var(--glow-border)}
.pctrl .cc input[type="range"]{width:50px;height:3px;accent-color:var(--cyan);background:transparent;cursor:pointer}
.vid-inf{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 12px}
.vid-inf .ti{font-weight:600;font-size:13px;color:var(--muted);flex:1;min-width:0;word-break:break-all}

/* 写真相册 */
.gal-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.gal-head .ti{font-size:16px;font-weight:800}
.gal-head .ac{display:flex;gap:5px;flex-wrap:wrap}
.gal-head .ac .btn-s{font-size:10px;padding:4px 10px;min-height:28px}
.gal-tip{font-size:12px;color:var(--muted);padding:4px 0 8px;display:flex;align-items:center;gap:5px}
.gal-tip .hl{background:rgba(0,240,255,.1);padding:2px 8px;border-radius:var(--r-full);color:var(--cyan);font-size:11px}
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pc{
  background:var(--surface2);border-radius:var(--r-sm);overflow:hidden;
  border:1px solid var(--border);position:relative;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;
  cursor:grab;will-change:transform;
}
.pc:hover{transform:scale(1.04);box-shadow:0 10px 30px rgba(0,0,0,.5);z-index:10;border-color:var(--glow-border)}
.pc:active{cursor:grabbing}
.pc .md{aspect-ratio:3/4;overflow:hidden;background:var(--surface)}
.pc .md img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer}
.pc footer{
  padding:6px 8px;font-size:10px;color:var(--muted);text-align:center;
  line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:rgba(6,8,15,.5);backdrop-filter:blur(6px);
}

/* 排序按钮 */
.sort-btns{position:absolute;top:4px;right:4px;display:flex;flex-direction:column;gap:2px;z-index:5;}
.sort-btns button{width:24px;height:24px;border-radius:6px;border:0;font-size:11px;display:grid;place-items:center;cursor:pointer;opacity:.75;transition:opacity .2s;}
.sort-btns button:hover{opacity:1}
.sb-up{background:rgba(0,240,255,.3);color:var(--cyan)}
.sb-dn{background:rgba(255,45,149,.3);color:var(--magenta)}



/* 养成任务 */
.m-list{display:flex;flex-direction:column;gap:8px}
.m-card{
  background:var(--surface2);border-radius:var(--r-sm);
  padding:12px 14px;border:1px solid var(--border);transition:border-color .2s;
}
.m-card:hover{border-color:var(--glow-border)}
.m-card .mn{font-weight:800;font-size:14px;display:flex;align-items:center;gap:7px}
.m-card .mn .num{font-family:var(--mono);font-size:11px;color:var(--cyan);background:rgba(0,240,255,.1);padding:2px 7px;border-radius:var(--r-full)}
.m-card .md2{color:var(--muted);font-size:12px;margin:4px 0}
.m-card .mr{color:var(--gold);font-size:11px;font-family:var(--mono)}
.m-card .ma{margin-top:8px}
.m-card .ma .bm{
  padding:7px 18px;font-size:12px;border-radius:var(--r-full);border:0;
  background:linear-gradient(135deg,var(--cyan),var(--magenta));
  color:#fff;font-weight:700;min-height:36px;
  box-shadow:0 3px 12px rgba(0,240,255,.25);
}
.m-card .ma .bm:hover{box-shadow:0 3px 20px rgba(0,240,255,.4)}
.m-card .ma .bm:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.m-card .ma .bm.done{background:var(--surface2);color:var(--green);border:1px solid rgba(0,230,138,.3);box-shadow:none}

/* 粉丝留言 */
.c-area textarea{
  width:100%;min-height:70px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--surface2);
  color:var(--fg);padding:10px 12px;resize:vertical;
  font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;
}
.c-area textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,240,255,.1)}
.c-acts{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.c-acts .btn-s{font-size:11px;padding:6px 14px;min-height:34px}
.c-acts .btn-s.dng{color:var(--red);border-color:rgba(255,77,106,.2)}
.c-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.ci{
  display:flex;gap:10px;align-items:flex-start;padding:10px 12px;
  background:var(--surface2);border-radius:var(--r-sm);
  border:1px solid var(--border);transition:border-color .2s;
}
.ci:hover{border-color:var(--glow-border)}
.ci img{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--border);cursor:pointer}
.ci .ct{flex:1;font-size:13px;line-height:1.55;word-break:break-word;cursor:pointer}
.ci .tm{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px}

/* 成就 */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.ac{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:12px 8px;text-align:center;
  transition:border-color .3s;
}
.ac.ul{border-color:var(--gold);box-shadow:0 0 12px rgba(255,215,0,.12)}
.ac.lk{opacity:.4}
.ac .ai{font-size:24px;display:block;margin-bottom:4px}
.ac .an{font-size:11px;font-weight:700;margin-bottom:1px}
.ac .ad{font-size:9px;color:var(--muted)}

/* 弹窗 */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);z-index:9000;
  display:grid;place-items:center;padding:20px;
  animation:mIn .2s ease;
}
@keyframes mIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);max-width:380px;width:100%;
  max-height:80vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal-h h2{font-size:16px;font-weight:800}
.modal-h .cb{width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--fg);font-size:16px;display:grid;place-items:center}
.modal-b{padding:14px 18px}
.si{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)}
.si:last-child{border-bottom:0}
.si .st2{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--cyan);min-width:44px;white-space:nowrap}
.si .sn{font-size:13px;flex:1}

/* 预览 */
.prev-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:grid;place-items:center;z-index:9999;padding:20px;cursor:zoom-out;
}
.prev-ov img{max-width:94vw;max-height:90vh;border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,.8)}

/* 滚动按钮 */
.scroll-btns{position:fixed;right:14px;bottom:calc(var(--nav-h) + 16px + var(--safe-b));z-index:200;display:flex;flex-direction:column;gap:6px;}
.scroll-btns button{width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--fg);font-size:16px;display:grid;place-items:center;backdrop-filter:blur(8px);opacity:.7;transition:opacity .2s;}
.scroll-btns button:hover{opacity:1}

/* Toast */
.toast{
  position:fixed;left:50%;bottom:calc(28px + var(--nav-h) + var(--safe-b));
  transform:translateX(-50%);
  background:rgba(6,8,15,.92);border:1px solid var(--glow-border);
  padding:10px 20px;border-radius:var(--r-sm);z-index:99999;
  backdrop-filter:blur(10px);font-size:13px;max-width:85vw;text-align:center;
  color:var(--fg);pointer-events:none;
  box-shadow:0 6px 24px rgba(0,0,0,.5),0 0 16px rgba(0,240,255,.1);
  animation:tIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(16px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

/* 飘字 */
.ft{
  position:fixed;pointer-events:none;z-index:99998;
  font-size:16px;font-weight:800;font-family:var(--mono);
  animation:fUp 1.1s ease-out forwards;
  text-shadow:0 0 10px currentColor;
}
@keyframes fUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(1.3)}}

/* 成就弹窗 */
.ach-pop{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.5);
  background:var(--bg2);border:2px solid var(--gold);
  border-radius:var(--r);padding:28px 36px;text-align:center;z-index:99999;
  box-shadow:0 0 48px rgba(255,215,0,.3);
  animation:apIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes apIn{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.ach-pop .api{font-size:48px;display:block;margin-bottom:10px}
.ach-pop .apt{font-size:12px;color:var(--gold);font-family:var(--mono);letter-spacing:.08em;margin-bottom:4px}
.ach-pop .apn{font-size:20px;font-weight:800}

.foot{
  padding:12px 14px;text-align:center;color:var(--muted);
  font-size:11px;border-top:1px solid var(--border);margin-top:6px;
  font-family:var(--mono);letter-spacing:.04em;
}

.hidden{display:none!important}

/* 存储状态指示 */
.storage-info{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:8px 12px;margin:6px 0;
  font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;
}
.storage-info .si-val{color:var(--cyan);font-family:var(--mono)}

/* 响应式 */
/* ===== 手机小屏 ===== */
@media(min-width:480px){
  .gal-grid{grid-template-columns:repeat(4,1fr)}
  .ach-grid{grid-template-columns:repeat(4,1fr)}
}

/* ===== 平板 ===== */
@media(min-width:768px){
  .content{max-width:720px;margin:0 auto;padding:16px 20px}
  .gal-grid{grid-template-columns:repeat(4,1fr);gap:10px}
  .act-btns{grid-template-columns:repeat(3,1fr)}
  .topbar{padding-left:20px;padding-right:20px}
}

/* ===== 桌面端 ===== */
/* ===== \u684c\u9762\u7aef ===== */
@media(min-width:1024px){

  /* \u9762\u677f */
  .panel{display:none!important}

  /* \u4e3b\u9875\u9762\u677f\u53cc\u5217 */

  #pMedia{width:100%}
  #pMedia > .card{flex:0 0 calc(50% - 10px)}

  /* \u76f8\u518c\u7f51\u683c */
  .gal-grid{
    grid-template-columns:repeat(5,1fr);
    gap:12px;
  }
  .pc{border-radius:var(--r)}
  .pc:hover{transform:scale(1.03);box-shadow:0 12px 36px rgba(0,0,0,.5)}

  .player{border-radius:var(--r)}

  /* \u4efb\u52a1/\u7c89\u4e1d/\u6210\u5c31\u5355\u5217\u94fa\u6ee1 */
  #pMission, #pFan, #pAch{width:100%}

  .card{border-radius:var(--r)}
  .card-body{padding:18px 20px}
  .card-title{font-size:18px}

  /* \u5e95\u90e8\u5bfc\u822a\u2192\u9876\u90e8\u6a2a\u5411\u6807\u7b7e */
  .bottom-nav{
    position:relative;
    bottom:auto;left:auto;right:auto;
    height:auto;
    padding:8px 20px;
    display:flex;
    justify-content:center;
    gap:6px;
    background:rgba(6,8,15,.7);
    backdrop-filter:blur(10px);
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
    max-width:1400px;
    margin:0 auto;
    width:100%;

  .bottom-nav .nav-item{
    flex:none;

  .bottom-nav .nav-item.active{
    background:rgba(0,240,255,.1);

  }
  .bottom-nav .nav-item.active::after{display:none}
  .bottom-nav .nav-icon{font-size:16px}

  /* \u5f39\u7a97 */
  .modal{max-width:480px;border-radius:var(--r)}
  .modal-h h2{font-size:18px}

  /* \u9884\u89c8 */
  .prev-ov{padding:40px}
  .prev-ov img{max-width:80vw;max-height:85vh;border-radius:var(--r)}

  .scroll-btns{right:28px;bottom:28px}
  .toast{bottom:28px;font-size:14px;padding:12px 24px}

  .ci{padding:12px 14px}
  .ci img{width:40px;height:40px}
  .ach{padding:12px 14px}
  .m-item{padding:12px 14px}
}

/* ===== \u5927\u684c\u9762 ===== */
@media(min-width:1440px){
  .topbar,.lv-bar,.content,.bottom-nav{max-width:1400px}

  // ---- IndexedDB 存储（不限制内存） ----
  var DB_NAME = 'starpath_db_v3';

  function openDB() {
    return new Promise(function(ok, no) {
      var r = indexedDB.open(DB_NAME, DB_VER);
      r.onupgradeneeded = function(e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains('photos')) d.createObjectStore('photos', { keyPath: 'id' });
        if (!d.objectStoreNames.contains('videos')) d.createObjectStore('videos', { keyPath: 'id' });
        if (!d.objectStoreNames.contains('avatar')) d.createObjectStore('avatar', { keyPath: 'id' });
      };
      r.onsuccess = function(e) { db = e.target.result; ok(db); };
      r.onerror = function(e) { no(e); };
    });
  }

  function dbPut(store, data) {
    return new Promise(function(ok, no) {
      if (!db) { no('db not open'); return; }
      var t = db.transaction(store, 'readwrite'), s = t.objectStore(store);
      var r = s.put(data);
      r.onsuccess = function() { ok(r.result); };
      r.onerror = function(e) { no(e); };
    });
  }

  function dbGet(store, id) {
    return new Promise(function(ok, no) {
      if (!db) { no('db not open'); return; }
      var t = db.transaction(store, 'readonly'), s = t.objectStore(store);
      var r = s.get(id);
      r.onsuccess = function() { ok(r.result); };
      r.onerror = function(e) { no(e); };
    });
  }

      var t = db.transaction(store, 'readwrite'), s = t.objectStore(store);
      var r = s.delete(id);

    g.addColorStop(0, '#0a1628');
    g.addColorStop(1, '#1a0a2e');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 200, 200);
    for (var i = 0; i < 25; i++) {
      ctx.fillStyle = 'rgba(0,240,255,' + (Math.random() * .4 + .1) + ')';
      ctx.beginPath();
      ctx.arc(Math.random() * 200, Math.random() * 200, Math.random() * 2 + .5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText((S.nickname || '').slice(0, 4) || '★', 100, 100);

  // ---- 粒子 ----
  function initP() {
    var cv = document.getElementById('particles');
    if (!cv) return;
    var ctx = cv.getContext('2d');
    var pts = [], cnt = 20;
    function rsz() { cv.width = innerWidth; cv.height = innerHeight; }
    rsz();
    addEventListener('resize', rsz);
    for (var i = 0; i < cnt; i++) {
      pts.push({
        x: Math.random() * cv.width,
        y: Math.random() * cv.height,
        r: Math.random() * 1.5 + .3,
        dx: (Math.random() - .5) * .25,
        dy: (Math.random() - .5) * .25,
        o: Math.random() * .4 + .1,
        c: ['rgba(0,240,255,', 'rgba(255,45,149,', 'rgba(168,85,247,', 'rgba(255,215,0,'][Math.floor(Math.random() * 4)]
      });
    }
    var frame = 0;
    function draw() {
      frame++;
      ctx.clearRect(0, 0, cv.width, cv.height);
      for (var i = 0; i < pts.length; i++) {
        var p = pts[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.c + p.o + ')';
        ctx.fill();
        p.x += p.dx; p.y += p.dy;
        if (p.x < 0) p.x = cv.width;
        if (p.x > cv.width) p.x = 0;
        if (p.y < 0) p.y = cv.height;
        if (p.y > cv.height) p.y = 0;
      }
      if (frame % 3 === 0) {
        for (var i = 0; i < pts.length; i++) {
          for (var j = i + 1; j < pts.length; j++) {
            var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
            var d = dx * dx + dy * dy;
            if (d < 10000) {
              var dist = Math.sqrt(d);
              ctx.beginPath();
              ctx.moveTo(pts[i].x, pts[i].y);
              ctx.lineTo(pts[j].x, pts[j].y);
              ctx.strokeStyle = 'rgba(0,240,255,' + (0.05 * (1 - dist / 100)) + ')';
              ctx.lineWidth = .5;
              ctx.stroke();
            }
          }
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  }

  async function handleF(list, from) {
    var files = Array.prototype.slice.call(list || []);
    if (!files.length) return;

    var currentPhotos = (S.photos || []).length;
    var currentVideos = (S.videos || []).length;
    var newPhotos = 0, newVideos = 0;
    files.forEach(function(f) { if (isVideo(f)) newVideos++; else newPhotos++; });
    if (currentPhotos + newPhotos > MAX_PHOTOS) {
      showModal('空间不足', '相册已满，最多 ' + MAX_PHOTOS + ' 张。请先删除一些再添加。');
      return;
    }
    if (currentVideos + newVideos > MAX_VIDEOS) {
      showModal('空间不足', '视频已满，最多 ' + MAX_VIDEOS + ' 个。请先删除一些再添加。');
      return;
    }

    var av = 0, ap = 0, imp = [], total = files.length;
    for (var i = 0; i < total; i++) {
      var f = files[i];
      if (isVideo(f)) {
        try {
          var blob = f; // 原样存储，不压缩
          S.videoMeta = S.videoMeta || [];
          var vid = { id: 'v_' + Date.now() + '_' + i, title: f.name };
          S.videoMeta = [vid];
          await dbClear('videos');
          await dbPut('videos', { id: vid.id, blob: blob, title: f.name });
          var url = URL.createObjectURL(blob);
          S.mainVideo = url;
          S.videos = [{ title: f.name, src: url }];
          var v = $('#mVid');
          if (v) {
            v.src = url;
            v.loop = true;
            v.style.display = 'block';
            var ph = $('#noVid');
            if (ph) ph.style.display = 'none';
            v.load();
            v.play().catch(function() {});
          }
          av++;
          saveMeta();
        } catch(e) {
          toast('视频导入失败');
        }
      } else {
        try {
          // 原样存储，不压缩图片
          var pid = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
          await dbPut('photos', { id: pid, blob: f, title: f.name || '' });
          var du = URL.createObjectURL(f);
          if (from === 'avatar') {
            await dbClear('avatar');
            await dbPut('avatar', { id: 'avatar', blob: f });
            S.avatar = du;
            rAv();
            toast('头像已更新');
            saveMeta();
            continue;
          }
          imp.push({ id: pid, title: f.name || '', src: du });
          ap++;
        } catch(e) {
          toast('图片读取失败');
        }
      }
    }
    if (imp.length) {
      if (from === 'photo' || from === 'local' || from === 'storage') {
        S.photoMeta = S.photoMeta || [];
        imp.forEach(function(p) { S.photoMeta.push({ id: p.id, title: p.title }); });
        if (!S.mainPhoto && imp.length) S.mainPhoto = imp[0].src;
        S.photos = S.photos.concat(imp);
      }
    }
    saveMeta();
    rPhotos();
    rVids();
    if (av && !ap) switchPanel('pMedia');
    var msg = '已导入 ' + files.length + ' 个素材';
    if (from === 'storage') msg = '已从手机存储导入 ' + files.length + ' 张';
    toast(msg);
    checkAch();
  }

    load();
    sanitize();

    // 从 IndexedDB 加载媒体
    try {
      var photos = await dbGetAll('photos');
      S.photos = S.photos || [];
      if (Array.isArray(photos)) {
        photos.forEach(function(p) {
          if (p && p.blob) {
            var url = URL.createObjectURL(p.blob);
            S.photos.push({ id: p.id, title: p.title || '', src: url });
            S.photoMeta = S.photoMeta || [];
            S.photoMeta.push({ id: p.id, title: p.title || '' });
          }
        });
      }
      var av = await dbGet('avatar', 'avatar');
      if (av && av.blob) {
        S.avatar = URL.createObjectURL(av.blob);
      }
    } catch(e) {}

    if (!Array.isArray(S.photos)) S.photos = [];
    if (!Array.isArray(S.videos)) S.videos = [];
    if (!S.mainPhoto && S.photos.length) S.mainPhoto = S.photos[0].src;
    if (!S.mainVideo && S.videos.length) S.mainVideo = S.videos[0].src;
    if (!Array.isArray(S.commentAvatars)) S.commentAvatars = [];

    saveMeta();
    rAll();
    bindNav();
    bindPlayer();
    bindSide();
    bindFan();
    bindLocal();
    initP();
    switchPanel('pHome');

    // 能量自动恢复
    setInterval(function() {
      if (S.energy < 100) {
        S.energy = Math.min(100, S.energy + 1);
        rMood();
      }
    }, 10000);

    console.log('星途 · StarPath v3 Desktop 已启动 — 不限制内存 · 无限制上传 · 离线版');
  }

  // 滚动按钮
  var btnTop = document.getElementById('btnScrollTop');
  var btnBot = document.getElementById('btnScrollBot');
  if (btnTop) btnTop.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
  if (btnBot) btnBot.addEventListener('click', function() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); });

  // 启动（直接进入游戏）
  initApp();
})();
</script>
</body>
</html>
